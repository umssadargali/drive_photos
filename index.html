<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drive Photo Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        h1 { text-align: center; color: #333; }

        /* Grid Layout */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* Modal (Zoom System) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 80%;
            border-radius: 5px;
            animation: zoomIn 0.3s;
        }

        @keyframes zoomIn {
            from {transform: scale(0.5)} to {transform: scale(1)}
        }

        .close {
            position: absolute;
            top: 20px; right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Photo Gallery</h1>
    <div id="photos" class="gallery">Loading photos...</div>

    <div id="myModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <script>
        // Apne Apps Script ka Web App URL yahan paste karein
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxoyy2FscwKbVc5d92Z4v4vCRxZjKBiFy2BnHLfx0mT23iPKnlVRzD6uAeZ3rWy22bT/exec';
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("img01");
        const span = document.getElementsByClassName("close")[0];

        fetch(scriptURL)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('photos');
                container.innerHTML = '';
                
                data.forEach(photo => {
                    const img = document.createElement('img');
                    img.src = photo.url;
                    img.alt = photo.name;
                    // Click karne par zoom hone wala function
                    img.onclick = function() {
                        modal.style.display = "flex";
                        modalImg.src = this.src;
                    }
                    container.appendChild(img);
                });
            })
            .catch(error => {
                console.error('Error!', error);
                document.getElementById('photos').innerHTML = "Photos load nahi ho pa rahi hain.";
            });

        // Modal band karne ke liye
        span.onclick = function() { modal.style.display = "none"; }
        modal.onclick = function(e) { if(e.target !== modalImg) modal.style.display = "none"; }
    </script>
</body>
</html>
