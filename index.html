<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Photo Gallery</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #fff; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Grid System */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            padding: 15px;
            max-width: 1200px;
            margin: auto;
        }

        .img-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            height: 180px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .img-card:hover { transform: scale(1.03); }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Zoom Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal img {
            max-width: 95%;
            max-height: 85%;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            color: white; font-size: 35px; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Gallery</h1>
</header>

<div class="gallery" id="gallery">
    </div>

<div id="photoModal" class="modal" onclick="this.style.display='none'">
    <span class="close-btn">&times;</span>
    <img id="fullImg" src="">
</div>

<script>
    // 1. Apna Apps Script URL yahan daalein
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzLc4ZCQB_pVxwQkbacg3zP4udTqbsS8JMi6MICUiLrclNSErGBOWVb_kwDd5Mo4p09/exec';

    async function loadGallery() {
        const container = document.getElementById('gallery');
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            if (data.length === 0) {
                container.innerHTML = "<p style='text-align:center'>Folder khali hai!</p>";
                return;
            }

            container.innerHTML = ''; // Loading text hatayein
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'img-card';
                
                const img = document.createElement('img');
                img.src = item.url;
                img.loading = "lazy"; // Better performance
                img.onclick = (e) => {
                    e.stopPropagation();
                    showZoom(item.url);
                };

                div.appendChild(img);
                container.appendChild(div);
            });
        } catch (error) {
            container.innerHTML = "<p>Photos load nahi ho saki. Check console.</p>";
            console.error(error);
        }
    }

    function showZoom(url) {
        document.getElementById('photoModal').style.display = 'flex';
        document.getElementById('fullImg').src = url;
    }

    // Initialize
    loadGallery();
</script>

</body>
</html>
