<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riyaz Sir's Digital Biology Lab</title>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; background: #e9ecef; color: #333; -webkit-font-smoothing: antialiased; }
        
        /* Master Container */
        .lab-container { max-width: 500px; margin: auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 15px; position: relative; overflow: hidden; }
        
        /* Official Header */
        h1 { margin-top: 0; font-size: 1.4rem; color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-bottom: 10px; }
        .PGT { font-size: 12px; color: #7f8c8d; text-align: center; margin-bottom: 15px; margin-top: -5px;}
        
        /* Organ Selection Navigation (Multi-Organ Feature) */
        .organ-nav { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee;}
        .nav-btn { background: #fff; border: 2px solid #ddd; color: #555; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: #3498db; color: white; border-color: #3498db; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        
        /* Image and Dots Layer */
        .anatomy-layer { position: relative; text-align: center; margin-bottom: 15px; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        .specimen-svg { width: 100%; max-width: 380px; height: auto; border-radius: 10px; display: none; } /* Hidden by default, loaded by JS */
        
        /* Pulsing Dots (Unified Style) */
        .label-dot {
            position: absolute; width: 16px; height: 16px; 
            border-radius: 50%; border: 2px solid white;
            cursor: pointer; animation: pulseEffect 1.5s infinite;
            box-shadow: 0 0 12px rgba(0,0,0,0.3); display: none; /* Initially Hidden */
        }
        @keyframes pulseEffect {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0,0,0,0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0,0,0,0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }
        
        /* Dot Color Coding */
        .color-red { background: #e74c3c; box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        .color-blue { background: #3498db; box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        .color-yellow { background: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .color-green { background: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }

        /* Info Drawer (Popup) */
        .info-drawer { 
            background: rgba(44, 62, 80, 0.98); color: white; border-radius: 12px; 
            padding: 15px; display: none; position: fixed; bottom: -100px; left: 0; width: 100%; 
            transition: bottom 0.3s ease; z-index: 1000; box-sizing: border-box;
        }
        .info-drawer.open { bottom: 0; }
        #part-header { margin-top: 0; font-size: 17px; color: #3498db;}
        #part-desc { margin: 0; font-size: 13px; line-height: 1.5; color: #bdc3c7; }
        .close-drawer { position: absolute; top: 8px; right: 15px; font-size: 22px; color: #fff; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: rgba(0,0,0,0.5); z-index: 999; }

    </style>
</head>
<body>

<div class="lab-container">
    <h1>🔬 Digital Biology Lab</h1>
    <p class="PGT">Presented by Riyaz Sir, Zoology PGT</p>
    
    <div class="organ-nav">
        <button class="nav-btn active" onclick="loadOrgan('Heart')" id="btn-Heart">❤️ Heart</button>
        <button class="nav-btn" onclick="loadOrgan('Cell')" id="btn-Cell">🦠 Cell</button>
        <button class="nav-btn" onclick="loadOrgan('Kidney')" id="btn-Kidney">🩺 Kidney</button>
    </div>
    
    <div class="anatomy-layer" id="anatomy-layer">
        <img src="" class="specimen-svg" id="specimen-svg" alt="Biology Specimen">
        
        <div id="dots-container"></div>
    </div>

</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="info-drawer" id="part-drawer">
    <span class="close-drawer" onclick="closeDrawer()">&times;</span>
    <h3 id="part-header">Part Name</h3>
    <p id="part-desc"> Physiological details.</p>
</div>

<script>
    // Master Database (Organ-Specific Data, Coordinates, and Colors)
    const labData = {
        'Heart': {
            img: 'https://upload.wikimedia.org/wikipedia/commons/e/e5/Diagram_of_the_human_heart_%28cropped%29.svg',
            parts: {
                'Aorta': { top: '15%', left: '55%', color: 'color-red', desc: 'Largest artery. Carries Oxygenated blood from Left Ventricle to Body Systems.' },
                'Left Atrium': { top: '38%', left: '60%', color: 'color-red', desc: 'Receives Oxygen-rich blood from lungs via Pulmonary Veins.' },
                'Left Ventricle': { top: '60%', left: '63%', color: 'color-red', desc: 'Thickest chamber. Pumps Oxygenated blood into Aorta for systemic circulation.' },
                'Mitral Valve': { top: '48%', left: '68%', color: 'color-yellow', desc: 'AV Valve. Prevents backflow of blood from Left Ventricle to Left Atrium.' },
                'Superior Vena Cava': { top: '20%', left: '25%', color: 'color-blue', desc: 'Brings Deoxygenated blood from upper body (Head, Arms) to Right Atrium.' },
                'Right Ventricle': { top: '58%', left: '33%', color: 'color-blue', desc: 'Pumps Deoxygenated blood to the lungs via Pulmonary Artery for Oxygenation.' },
                'Pulmonary Artery': { top: '25%', left: '5%', color: 'color-blue', desc: 'Carries Deoxygenated blood FROM Right Ventricle TO lungs.' }
            }
        },
        'Cell': {
            img: 'https://upload.wikimedia.org/wikipedia/commons/4/48/Animal_cell_structure_en.svg',
            parts: {
                'Nucleus': { top: '45%', left: '50%', color: 'color-red', desc: 'Master Control Center. Contains genetic material (DNA) and controls cell activities.' },
                'Mitochondria': { top: '70%', left: '70%', color: 'color-yellow', desc: 'Powerhouse of the Cell. Site of Cellular Respiration and ATP (energy) production.' },
                'Ribosomes': { top: '30%', left: '60%', color: 'color-green', desc: 'Protein Factories. Sites where protein synthesis occurs.' },
                'Endoplasmic Reticulum': { top: '40%', left: '30%', color: 'color-green', desc: 'Network for transporting proteins and lipids. Rough ER has ribosomes.' },
                'Cell Membrane': { top: '10%', left: '50%', color: 'color-blue', desc: 'Selectively permeable barrier that controls what enters and exits the cell.' }
            }
        },
        'Kidney': {
            img: 'https://upload.wikimedia.org/wikipedia/commons/e/e0/Kidney_cross_section.svg',
            parts: {
                'Renal Cortex': { top: '20%', left: '50%', color: 'color-green', desc: 'Outer region of the kidney where ultrafiltration occurs.' },
                'Renal Medulla': { top: '50%', left: '40%', color: 'color-yellow', desc: 'Inner region containing nephron loops (Loops of Henle) and collecting ducts.' },
                'Renal Artery': { top: '45%', left: '70%', color: 'color-red', desc: 'Carries oxygenated, unfiltered blood FROM the aorta TO the kidney.' },
                'Renal Vein': { top: '55%', left: '75%', color: 'color-blue', desc: 'Carries deoxygenated, filtered blood FROM the kidney TO the inferior vena cava.' },
                'Ureter': { top: '80%', left: '65%', color: 'color-yellow', desc: 'Tube that carries urine from the kidney to the urinary bladder.' }
            }
        }
    };

    function loadOrgan(organName) {
        // 1. Update Navigation Buttons
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${organName}`).classList.add('active');
        
        // 2. Load New Image
        const img = document.getElementById('specimen-svg');
        const container = document.getElementById('dots-container');
        
        img.style.display = 'none'; // Fade out
        container.innerHTML = ''; // Clear old dots
        
        img.src = labData[organName].img;
        
        // 3. Precision Dots Loading (Advanced Multi-Layer positioning)
        img.onload = function() {
            img.style.display = 'block'; // Fade in
            
            const parts = labData[organName].parts;
            for (const part in parts) {
                const data = parts[part];
                
                // Create new dot dynamically
                const dot = document.createElement('div');
                dot.className = `label-dot ${data.color}`;
                dot.style.top = data.top;
                dot.style.left = data.left;
                dot.style.display = 'block'; // Unhide dot
                
                // Set click action
                dot.onclick = () => showPart(part, data.desc);
                
                container.appendChild(dot);
            }
        };
        
        closeDrawer(); // Close any open drawer
    }

    function showPart(partName, description) {
        const header = document.getElementById('part-header');
        const desc = document.getElementById('part-desc');
        const drawer = document.getElementById('part-drawer');
        const overlay = document.getElementById('overlay');
        
        // Android Haptic Vibrate (Zero-Error fail-safe)
        if (navigator.vibrate) { navigator.vibrate(60); }

        header.innerText = partName;
        desc.innerText = description;
        
        // Slide Up Animation
        overlay.style.display = 'block';
        drawer.style.display = 'block';
        setTimeout(() => drawer.classList.add('open'), 10);
    }

    function closeDrawer() {
        const drawer = document.getElementById('part-drawer');
        const overlay = document.getElementById('overlay');
        
        drawer.classList.remove('open');
        setTimeout(() => { 
            if(drawer) drawer.style.display = 'none'; 
            if(overlay) overlay.style.display = 'none';
        }, 300);
    }

    // Load default organ on startup
    loadOrgan('Heart');

</script>

</body>
</html>
